name: Conza CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────
  # 1. Lint & test both backends
  # ──────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - path: conza_customers/conza_backend
            name: conza-backend
          - path: conza_bp/bp_backend
            name: bp-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies (${{ matrix.service.name }})
        working-directory: ${{ matrix.service.path }}
        run: npm ci

      - name: Run lint (${{ matrix.service.name }})
        working-directory: ${{ matrix.service.path }}
        run: npm run lint --if-present

      - name: Run tests (${{ matrix.service.name }})
        working-directory: ${{ matrix.service.path }}
        run: npm test --if-present
        env:
          NODE_ENV: test

  # ──────────────────────────────────────────────────
  # 2. Deploy conza_backend to Railway
  #    (only runs on push to main, after lint passes)
  # ──────────────────────────────────────────────────
  deploy-conza-backend:
    name: Deploy conza-backend
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy conza-backend
        working-directory: conza_customers/conza_backend
        run: railway up --service conza-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_CONZA || secrets.RAILWAY_TOKEN }}

  # ──────────────────────────────────────────────────
  # 3. Deploy bp_backend to Railway
  # ──────────────────────────────────────────────────
  deploy-bp-backend:
    name: Deploy bp-backend
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy bp-backend
        working-directory: conza_bp/bp_backend
        run: railway up --service bp-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_BP || secrets.RAILWAY_TOKEN }}

  # ──────────────────────────────────────────────────
